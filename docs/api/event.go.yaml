openapi: 3.1.0
info:
  title: 事件管理 API
  version: 1.0.0
  description: AI 检测事件的查询和管理接口

tags:
  - name: events
    description: 事件管理

paths:
  /events:
    get:
      tags:
        - events
      summary: 分页查询事件列表
      operationId: findEvents
      description: |
        分页查询 AI 检测事件，支持按通道 ID、设备 ID、标签和时间范围筛选。
        结果按事件开始时间倒序排列。
      parameters:
        - name: page
          in: query
          description: 页码
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          description: 每页数量
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          description: 排序字段
          schema:
            type: string
        - name: start_ms
          in: query
          description: 开始时间（毫秒时间戳）
          schema:
            type: integer
            format: int64
        - name: end_ms
          in: query
          description: 结束时间（毫秒时间戳）
          schema:
            type: integer
            format: int64
        - name: did
          in: query
          description: 设备 ID
          schema:
            type: string
        - name: cid
          in: query
          description: 通道 ID
          schema:
            type: string
        - name: label
          in: query
          description: 检测标签（如 person, car）
          schema:
            type: string
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  total:
                    type: integer
                    format: int64
                    description: 总数

  /events/{id}:
    get:
      tags:
        - events
      summary: 获取单个事件详情
      operationId: getEvent
      parameters:
        - name: id
          in: path
          required: true
          description: 事件 ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: 事件不存在

    put:
      tags:
        - events
      summary: 更新事件信息
      operationId: editEvent
      parameters:
        - name: id
          in: path
          required: true
          description: 事件 ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditEventInput"
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

    delete:
      tags:
        - events
      summary: 删除事件
      operationId: delEvent
      parameters:
        - name: id
          in: path
          required: true
          description: 事件 ID
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/image/{path}:
    get:
      tags:
        - events
      summary: 获取事件快照图片
      operationId: getEventImage
      description: |
        根据事件的 image_path 字段获取快照图片。
        路径格式为: {cid}/{filename}.jpg
      parameters:
        - name: path
          in: path
          required: true
          description: 图片相对路径（如 ch4w2cz/20260106143003_123456.jpg）
          schema:
            type: string
      responses:
        "200":
          description: 成功返回图片
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
        "404":
          description: 图片不存在

components:
  schemas:
    Event:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 事件 ID
        did:
          type: string
          description: 设备 ID
        cid:
          type: string
          description: 通道 ID
        started_at:
          type: integer
          format: int64
          description: 事件开始时间（毫秒时间戳）
        ended_at:
          type: integer
          format: int64
          description: 事件结束时间（毫秒时间戳）
        label:
          type: string
          description: 检测标签（如 person, car）
        score:
          type: number
          format: float
          description: 置信度（0.0-1.0）
        zones:
          type: string
          description: 检测区域 JSON（边界框信息）
        image_path:
          type: string
          description: 图片相对路径，可通过 /events/image/{image_path} 访问
        model:
          type: string
          description: 分析模型名称
        created_at:
          type: integer
          format: int64
          description: 创建时间（毫秒时间戳）
        updated_at:
          type: integer
          format: int64
          description: 更新时间（毫秒时间戳）

    EditEventInput:
      type: object
      properties:
        ended_at:
          type: integer
          format: int64
          description: 事件结束时间（毫秒时间戳）
